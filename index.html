<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Football Goal Counter</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="score-board">
    <h2 id="player-name">Player: Stecy#14</h2>
    <h3 id="timer">Time : 00:00</h3>
    <h2 id="goal-display">Goals: 0</h2>
    </div>
    <p id="celebration"></p>
    <h3>Goal History</h3>
    <ul id="history"></ul>
    <button id="start-btn">Start</button>
    <button id="score-btn">Score Goal</button>
    <button id="reset-btn">Reset</button>
    <audio id="goal-sound" src="goal.mp3"></audio>
    <script src="script.js"></script>
  </body>
</html>
